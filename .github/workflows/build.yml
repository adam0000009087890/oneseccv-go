name: Build Windows MSI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build EXE with Wails
        run: wails build -platform windows/amd64

      - name: Verify EXE
        run: |
          if (!(Test-Path "build\bin\OneSecCV.exe")) { Write-Error "EXE not found"; exit 1 }
          Write-Host "EXE ready: $((Get-Item 'build\bin\OneSecCV.exe').Length / 1MB) MB"

      - name: Install WiX Toolset v3
        run: |
          choco install wixtoolset --version=3.14.0 -y
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI
        working-directory: installer
        run: |
          candle.exe -ext WixUIExtension OneSecCV.wxs
          light.exe  -ext WixUIExtension -out OneSecCV.msi OneSecCV.wixobj

      - name: Verify MSI
        run: |
          if (!(Test-Path "installer\OneSecCV.msi")) { Write-Error "MSI not found"; exit 1 }
          Write-Host "MSI ready: $((Get-Item 'installer\OneSecCV.msi').Length / 1MB) MB"

      - name: Upload MSI (installer)
        uses: actions/upload-artifact@v4
        with:
          name: OneSecCV-Windows-Installer
          path: installer\OneSecCV.msi

      - name: Upload EXE (portable)
        uses: actions/upload-artifact@v4
        with:
          name: OneSecCV-Windows-Portable
          path: build\bin\OneSecCV.exe